# Builds the Arm A mini-GPU engine to WebAssembly and publishes the browser
# playground (simt/web) to GitHub Pages. The .js/.wasm are DERIVED artifacts —
# they are gitignored and rebuilt here from source, mirroring simt/build_wasm.ps1.
name: Deploy playground

on:
  push:
    branches: [main]
    paths:
      - "simt/src/**"
      - "simt/include/**"
      - "simt/web/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 6.0.2

      - name: Build WASM engine (flags mirror simt/build_wasm.ps1)
        run: |
          emcc -O2 -std=c++17 -fexceptions -Isimt/include \
            simt/src/isa.cpp simt/src/assembler.cpp simt/src/core.cpp simt/src/wasm_api.cpp \
            -s MODULARIZE=1 -s EXPORT_NAME=SimtModule \
            -s "EXPORTED_FUNCTIONS=['_run_kernel','_malloc','_free']" \
            -s "EXPORTED_RUNTIME_METHODS=['ccall','cwrap']" \
            -s INITIAL_MEMORY=67108864 \
            -o simt/web/simt.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: simt/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
