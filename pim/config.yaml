# Grove Arm C — PIM data-movement measurement config (pim-prereg.md §6).
# Frozen with pim-prereg.md. Canonical = the decision point; sweep = robustness + the
# reduction-ratio crossover. No threshold moves after data is generated (§10).
seed: 42

# Canonical operating point (decision-driving) — from DLRM literature, not tuned.
canonical:
  kernel: embedding_bag
  d: 64
  L: 40
  B: 16
  nb: 1024
  R_tab: 4000000
  idx_b: 4
  b: 4
  cap: 32
  e: 160
  placement: round_robin

# Pre-committed sweep (§6). Decision is at canonical; sweep characterises robustness.
sweep:
  L: [1, 2, 4, 8, 16, 32, 40, 64, 128, 256]   # aggregation factor axis (crossover)
  B: [4, 8, 16, 32, 64, 128]                   # banking tension
  d: [16, 32, 64, 128]                         # hidden-traffic amortisation
  idx_b: [4, 8]
  placement: [round_robin, clustered]
  e: [50, 160, 640]                            # energy sensitivity (secondary)

# GO/NO-GO thresholds (§5). run.py only REPORTS these; experimentAS renders the verdict.
decision:
  go_canonical_dmr: 3.0
  go_sweep_min_dmr: 1.5
  nogo_dmr: 1.5
  worth_it_dmr: 1.5        # DMR level defining the crossover L*
  dlrm_L: 40               # the realistic DLRM operating point on the L axis
  realistic_L_range: [8, 256]   # the aggregating DLRM regime for the robustness check
